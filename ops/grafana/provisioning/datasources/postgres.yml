apiVersion: 1

# Postgres datasource so dashboards can show REAL job status (pending / running /
# done / failed / dead) straight from the job_runs table — Loki can only count
# log events, not live queue/job state.
datasources:
  - name: Postgres
    uid: whatsapp_pg
    type: grafana-postgresql-datasource
    access: proxy
    url: postgres:5432
    user: postgres
    isDefault: false
    editable: true
    jsonData:
      database: whatsapp_sum
      sslmode: disable
      postgresVersion: 1600
    secureJsonData:
      password: postgres
