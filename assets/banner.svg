<svg width="1000" height="300" viewBox="0 0 1000 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Catchup — local-first WhatsApp summaries">
  <defs>
    <style>
      /* Sora referenced by family; PNG is rendered with EMBED=1 */
      .word { font-family: 'Sora', ui-sans-serif, system-ui, sans-serif; font-weight: 700; }
      .tag  { font-family: 'Sora', ui-sans-serif, system-ui, sans-serif; font-weight: 500; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1626"/>
      <stop offset="0.55" stop-color="#080f1c"/>
      <stop offset="1" stop-color="#05080f"/>
    </linearGradient>
    <radialGradient id="aurora" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(330 30) rotate(28) scale(560 320)">
      <stop stop-color="#38bdf8" stop-opacity="0.26"/>
      <stop offset="0.65" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1000 300) rotate(-140) scale(420 260)">
      <stop stop-color="#1e6fae" stop-opacity="0.18"/>
      <stop offset="0.7" stop-color="#1e6fae" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12203a"/>
      <stop offset="1" stop-color="#070c16"/>
    </linearGradient>
    <radialGradient id="tileGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(196 44) rotate(122) scale(214)">
      <stop stop-color="#5cc6f5" stop-opacity="0.45"/>
      <stop offset="0.62" stop-color="#5cc6f5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bubble" x1="44" y1="48" x2="214" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d6f4ff"/>
      <stop offset="0.45" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#36b8f0"/>
    </linearGradient>
    <linearGradient id="word" x1="212" y1="100" x2="272" y2="172" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f4fbff"/>
      <stop offset="0.5" stop-color="#cdeeff"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <filter id="tileShadow" x="-60" y="-40" width="380" height="400" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="9" stdDeviation="20" flood-color="#000000" flood-opacity="0.36"/>
      <feDropShadow dx="0" dy="2" stdDeviation="10" flood-color="#1ca3e0" flood-opacity="0.40"/>
    </filter>
    <filter id="bubbleShadow" x="-40" y="-30" width="336" height="336" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="6" stdDeviation="11" flood-color="#0b4a6b" flood-opacity="0.55"/>
    </filter>
    <filter id="wordGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.22  0 0 0 0 0.74  0 0 0 0 0.97  0 0 0 0.38 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="300" fill="url(#bg)"/>
  <rect width="1000" height="300" fill="url(#aurora)"/>
  <rect width="1000" height="300" fill="url(#aurora2)"/>
  <!-- top hairline highlight for a subtle "screen" sheen -->
  <rect x="0" y="0" width="1000" height="1.5" fill="#ffffff" fill-opacity="0.05"/>

  <g id="lockup" transform="translate(213 0)">
    <!-- frosted logo tile (icon artwork authored in 256-space) -->
    <g transform="translate(0 62)" filter="url(#tileShadow)">
      <g transform="scale(0.6875)">
        <rect width="256" height="256" rx="60" fill="url(#tile)"/>
        <rect width="256" height="256" rx="60" fill="url(#tileGlow)"/>
        <rect x="1.5" y="1.5" width="253" height="253" rx="58.5" stroke="#8fd6f7" stroke-opacity="0.20" stroke-width="3"/>
        <g filter="url(#bubbleShadow)">
          <path d="M74 50H182a30 30 0 0 1 30 30v54a30 30 0 0 1-30 30H120l-34 30 4-30H74a30 30 0 0 1-30-30V80a30 30 0 0 1 30-30Z" fill="url(#bubble)"/>
        </g>
        <path d="M74 50H182a30 30 0 0 1 30 30v6H44v-6a30 30 0 0 1 30-30Z" fill="#ffffff" fill-opacity="0.22"/>
        <g fill="#0a2540">
          <rect x="70" y="80" width="116" height="14" rx="7" fill-opacity="0.92"/>
          <rect x="70" y="106" width="86" height="14" rx="7" fill-opacity="0.80"/>
          <rect x="70" y="132" width="52" height="14" rx="7" fill-opacity="0.64"/>
        </g>
      </g>
    </g>

    <!-- wordmark + two-line tagline (left-aligned text block) -->
    <text class="word" x="212" y="150" font-size="84" letter-spacing="-1.5" fill="url(#word)" filter="url(#wordGlow)">Catchup</text>
    <text class="tag" x="214" y="184" font-size="18.5" letter-spacing="0.3" fill="#9fb4c9">Local-first WhatsApp summaries.</text>
    <text x="214" y="206" style="font-family:'Sora',ui-sans-serif,system-ui,sans-serif;font-weight:600" font-size="18.5" letter-spacing="0.3" fill="#d4e8f7">Nothing leaves your machine.</text>
  </g>
</svg>
