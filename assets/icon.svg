<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Catchup logo">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d1626"/>
      <stop offset="1" stop-color="#070a10"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(205 38) rotate(125) scale(210)">
      <stop stop-color="#38bdf8" stop-opacity="0.40"/>
      <stop offset="0.6" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bubble" x1="44" y1="52" x2="212" y2="186" gradientUnits="userSpaceOnUse">
      <stop stop-color="#aee9ff"/>
      <stop offset="0.5" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="soft" x="-40" y="-30" width="336" height="336" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="7" stdDeviation="12" flood-color="#1ca3e0" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- app tile -->
  <rect width="256" height="256" rx="60" fill="url(#tile)"/>
  <rect width="256" height="256" rx="60" fill="url(#glow)"/>
  <rect x="1.25" y="1.25" width="253.5" height="253.5" rx="58.75" stroke="#7dd3fc" stroke-opacity="0.16" stroke-width="2.5"/>

  <!-- speech bubble: body + tail -->
  <g filter="url(#soft)">
    <path d="M74 52H182a30 30 0 0 1 30 30v52a30 30 0 0 1-30 30H120l-34 30 4-30H74a30 30 0 0 1-30-30V82a30 30 0 0 1 30-30Z" fill="url(#bubble)"/>
  </g>
  <!-- glass highlight along the top edge -->
  <path d="M74 52H182a30 30 0 0 1 30 30v6H44v-6a30 30 0 0 1 30-30Z" fill="#ffffff" fill-opacity="0.20"/>

  <!-- summary lines: taper many → few (the gist) -->
  <g fill="#06243a">
    <rect x="70" y="80" width="116" height="14" rx="7" fill-opacity="0.92"/>
    <rect x="70" y="106" width="86" height="14" rx="7" fill-opacity="0.78"/>
    <rect x="70" y="132" width="52" height="14" rx="7" fill-opacity="0.62"/>
  </g>
</svg>
