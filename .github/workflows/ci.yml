name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # ffmpeg is used by the media pipeline; install it so any helper that
      # shells out has it available.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Integration tests use Testcontainers (Postgres, RabbitMQ). Docker is
      # available on ubuntu-latest. Run test files serially (--no-file-parallelism)
      # so concurrent container startups don't contend and flake under CI load.
      - name: Test
        run: npm test -- --no-file-parallelism
