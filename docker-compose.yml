# Pinned project name so the stack is independent of the folder name (renaming the
# directory won't orphan the containers/volumes). Postgres is part of this compose
# project — `make dev` brings it up alongside rabbitmq/loki/grafana. Data lives in
# the `pgdata` named volume. (The app's Node worker/serve, Ollama, and the Python
# Whisper transcriber run on the host by design.)
name: catchup

services:
  postgres:
    # pgvector-enabled Postgres (superset of the stock image) so the ask feature's
    # `CREATE EXTENSION vector` migration applies. pg16 keeps the major version pinned.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: whatsapp_sum
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d whatsapp_sum"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./ops/loki/config.yml:/etc/loki/local-config.yaml:ro
      # Durable log storage — survives container recreate and host reboot.
      # (Previously logs lived in the container's /tmp and were lost on restart.)
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  pgdata:
  loki-data:
