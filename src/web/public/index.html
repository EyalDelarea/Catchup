<!doctype html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#fbfcfa" />
  <title>סיכום וואטסאפ</title>
  <!-- Apply the stored/preferred theme before first paint to avoid a flash. -->
  <script>
    (function () {
      try {
        var s = localStorage.getItem("catchapp-theme");
        var dark = s === "dark" || (s !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.setAttribute("data-theme", "dark");
      } catch (e) {}
    })();
  </script>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- global stale/unhealthy banner (shown/hidden by app.js) -->
  <div id="stale-banner" class="stale-banner" role="alert" aria-live="assertive" hidden>
    <span class="stale-banner__icon" aria-hidden="true">⚠️</span>
    <span>המערכת לא מגיבה — ייתכן שחסרות הודעות אחרונות. הפעילו מחדש לסנכרון.</span>
  </div>

  <!-- responsive two-pane shell; data-view controls which pane shows on mobile -->
  <div id="layout" class="layout" data-view="feed">
    <header id="top-bar" class="top-bar"></header>
    <aside id="pane-list" class="pane pane--list" aria-label="קבוצות"></aside>
    <main id="pane-main" class="pane pane--main" aria-live="polite"></main>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
